{% extends "base.html" %}
{% block title %}Login — {{ t('app_name') }}{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto animate-fade-in">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center mx-auto mb-4 animate-scale-in">
            <i class="fa-solid fa-right-to-bracket text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold mb-2">{{ t('login_title') }}</h1>
        <p class="text-slate-400">{{ t('login_subtitle') }}</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card-strong p-8 animate-fade-in-up">
        <form method="POST" action="{{ url_for('login') }}">
            <!-- Email -->
            <div class="mb-6">
                <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fa-solid fa-envelope {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_email') }}
                </label>
                <input type="email" name="email" id="email" required
                       placeholder="{{ t('field_email_placeholder') }}"
                       class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-400/20 transition-all">
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label for="password" class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fa-solid fa-lock {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_password') }}
                </label>
                <input type="password" name="password" id="password" required
                       placeholder="Enter your password"
                       class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-400/20 transition-all">
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full py-4 rounded-2xl text-base font-bold bg-gradient-to-r from-primary-600 to-primary-500 text-white hover:from-primary-500 hover:to-primary-400 transition-all shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:scale-[1.02] active:scale-[0.98]">
                {{ t('btn_login') }}
            </button>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <p class="text-slate-400 text-sm">
                Don't have an account? 
                <a href="{{ url_for('onboard') }}" class="text-primary-400 font-semibold hover:text-primary-300 transition-colors">Sign up here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

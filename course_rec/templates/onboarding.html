{% extends "base.html" %}
{% block title %}{{ t('onboard_title') }} — {{ t('app_name') }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center mx-auto mb-4 animate-scale-in">
            <i class="fa-solid fa-user-plus text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold mb-2">{{ t('onboard_title') }}</h1>
        <p class="text-slate-400">{{ t('onboard_subtitle') }}</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card-strong p-8 animate-fade-in-up" id="onboarding-form-card">
        <form method="POST" action="{{ url_for('onboard') }}" id="onboarding-form">
            <!-- Full Name -->
            <div class="mb-6">
                <label for="name" class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fa-solid fa-user {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_name') }}
                </label>
                <input type="text" name="name" id="name" required
                       placeholder="{{ t('field_name_placeholder') }}"
                       class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-400/20 transition-all">
            </div>

            <!-- Email -->
            <div class="mb-6">
                <label for="email" class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fa-solid fa-envelope {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_email') }}
                </label>
                <input type="email" name="email" id="email" required
                       placeholder="{{ t('field_email_placeholder') }}"
                       class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-400/20 transition-all">
            </div>

            <!-- Study Level -->
            <div class="mb-6">
                <label for="level" class="block text-sm font-semibold text-slate-300 mb-2">
                    <i class="fa-solid fa-layer-group {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_level') }}
                </label>
                <select name="level" id="level" required
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-400/20 transition-all appearance-none cursor-pointer">
                    <option value="Beginner" class="bg-slate-800">{{ t('level_beginner') }}</option>
                    <option value="Intermediate" class="bg-slate-800">{{ t('level_intermediate') }}</option>
                    <option value="Advanced" class="bg-slate-800">{{ t('level_advanced') }}</option>
                </select>
            </div>

            <!-- Learning Goals -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-slate-300 mb-3">
                    <i class="fa-solid fa-bullseye {{ 'ms-1' if lang == 'ar' else 'me-1' }} text-primary-400"></i>
                    {{ t('field_goals') }}
                    <span class="text-xs text-slate-500 font-normal {{ 'ms-1' if lang == 'ar' else 'ml-1' }}">({{ t('btn_submit') }})</span>
                </label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="goals-grid">
                    {% for cat in categories %}
                    <label class="goal-checkbox glass-card px-4 py-3 flex items-center gap-3 cursor-pointer hover:bg-white/5 transition-all rounded-xl group" for="goal-{{ cat }}">
                        <input type="checkbox" name="goals" value="{{ cat }}" id="goal-{{ cat }}"
                               class="w-5 h-5 rounded-lg border-2 border-white/20 bg-transparent text-primary-500 focus:ring-primary-400/30 focus:ring-offset-0 cursor-pointer accent-indigo-500">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid {{ category_icons[cat] }} text-primary-400 group-hover:text-primary-300 transition-colors"></i>
                            <span class="text-sm font-medium">{{ get_cat_display(cat) }}</span>
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-onboard"
                    class="w-full py-4 rounded-2xl text-base font-bold bg-gradient-to-r from-primary-600 to-primary-500 text-white hover:from-primary-500 hover:to-primary-400 transition-all shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:scale-[1.02] active:scale-[0.98]">
                <i class="fa-solid fa-arrow-right {{ 'ms-2' if lang == 'ar' else 'me-2' }}"></i>
                {{ t('btn_submit') }}
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Highlight selected goals
    document.querySelectorAll('.goal-checkbox input').forEach(cb => {
        cb.addEventListener('change', (e) => {
            const label = e.target.closest('label');
            if (e.target.checked) {
                label.classList.add('border-primary-500/40', 'bg-primary-500/10');
                label.classList.remove('border-white/[0.08]');
            } else {
                label.classList.remove('border-primary-500/40', 'bg-primary-500/10');
            }
        });
    });

    // Form validation
    document.getElementById('onboarding-form').addEventListener('submit', (e) => {
        const checked = document.querySelectorAll('.goal-checkbox input:checked');
        if (checked.length === 0) {
            e.preventDefault();
            alert('Please select at least one learning goal.');
        }
    });
</script>
{% endblock %}

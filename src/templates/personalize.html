<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalize Your Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .form-control-lg {
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            padding: 1rem;
            font-size: 1rem;
            resize: none;
        }

        .form-control-lg:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-magic {
            background: linear-gradient(to right, #4F46E5, #8B5CF6);
            border: none;
            color: white;
            font-weight: 700;
            padding: 1rem;
            border-radius: 50px;
            transition: transform 0.2s;
        }

        .btn-magic:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
            color: white;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            display: none;
            /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status"></div>
        <h3 class="mt-4 fw-bold text-dark">Llama 3 is building your plan...</h3>
        <p class="text-muted">Analyzing your schedule & creating tasks</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card p-5">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="fa-solid fa-calendar-check fa-4x text-primary"></i>
                        </div>
                        <h2 class="fw-bold">Fit Learning into Your Life</h2>
                        <p class="text-muted">Tell our AI your constraints, and we'll build a realistic schedule.</p>
                    </div>

                    <form action="/generate" method="POST" onsubmit="showLoading()">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Your Availability & Goals</label>
                            <textarea name="user_schedule" class="form-control form-control-lg" rows="5"
                                placeholder="Example: I work 9-5 Mon-Fri. I can study 2 hours every evening and 4 hours on weekends. I want to finish these courses in 1 month."
                                required></textarea>
                            <div class="form-text mt-2">
                                <i class="fa-solid fa-info-circle"></i> Be specific! The more details, the better the
                                plan.
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-magic btn-lg">
                                <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Generate My Roadmap
                            </button>
                            <a href="/" class="btn btn-link text-muted text-decoration-none">Go Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
        }
    </script>

</body>

</html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pre-Assessment - LearnPath AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#6ddd81",
                        "primary-fixed-dim": "#adc6ff",
                        "on-background": "#191c1d",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "on-error-container": "#93000a",
                        "background": "#f8f9fa",
                        "on-secondary": "#ffffff",
                        "outline": "#717786",
                        "tertiary": "#b51b15",
                        "on-tertiary-fixed": "#410001",
                        "on-primary-fixed-variant": "#004493",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-container": "#00722f",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0058bc",
                        "tertiary-fixed": "#ffdad5",
                        "primary-container": "#0070eb",
                        "inverse-on-surface": "#f0f1f2",
                        "error": "#ba1a1a",
                        "tertiary-container": "#d9372b",
                        "surface-dim": "#d9dadb",
                        "surface-container": "#edeeef",
                        "secondary-container": "#86f898",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#930004",
                        "surface-tint": "#005bc1",
                        "outline-variant": "#c1c6d7",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed": "#001a41",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-secondary-fixed": "#002108",
                        "secondary": "#006e2c",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9fa",
                        "surface-container-high": "#e7e8e9",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#adc6ff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#89fa9b",
                        "surface-container-low": "#f3f4f5",
                        "on-surface-variant": "#414755",
                        "on-primary-container": "#fefcff",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#005320",
                        "on-surface": "#191c1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-surface');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom radio button styles for precision look */
        input[type="radio"] {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
            width: 1.25rem;
            height: 1.25rem;
            border: 1px solid theme('colors.outline-variant');
            border-radius: 50%;
            display: grid;
            place-content: center;
            background-color: theme('colors.surface-container-lowest');
            transition: all 0.2s ease-in-out;
        }
        input[type="radio"]::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em theme('colors.primary');
            background-color: theme('colors.primary');
        }
        input[type="radio"]:checked::before {
            transform: scale(1);
        }
        input[type="radio"]:focus {
            outline: 2px solid theme('colors.primary-fixed');
            outline-offset: 2px;
            border-color: theme('colors.primary');
        }
        input[type="radio"]:checked {
            border-color: theme('colors.primary');
        }
    </style>
</head>
<body class="min-h-screen antialiased flex flex-col items-center pt-8 pb-24 px-4 sm:px-6 lg:px-8">
<!-- Intent implies focused task: Assessment. Suppressing Global Nav Shells as per instructions. -->
<!-- Assessment Header & Progress -->
<header class="w-full max-w-3xl mb-12">
<div class="flex items-center gap-2 mb-4">
<a class="text-primary hover:text-primary-container transition-colors flex items-center gap-1 text-sm font-medium" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Exit Assessment
            </a>
</div>
<div class="bg-surface-container-lowest p-6 sm:p-8 rounded-xl outline outline-1 outline-outline-variant/20 shadow-[0_32px_64px_rgba(0,0,0,0.02)]">
<div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6">
<div>
<span class="text-primary font-bold tracking-[0.05em] uppercase text-xs mb-2 block font-label">Pre-Assessment</span>
<h1 class="text-3xl font-bold tracking-[-0.02em] text-on-surface font-headline leading-tight">Advanced Machine Learning Architecture</h1>
</div>
<div class="flex-shrink-0 text-right">
<span class="text-sm font-medium text-on-surface-variant bg-surface-container-low px-3 py-1.5 rounded-lg border border-outline-variant/20 inline-block">
                        Question 3 of 5
                    </span>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full bg-surface-container-high h-1.5 rounded-full overflow-hidden relative">
<!-- Pulse effect for AI-forward path -->
<div class="absolute inset-0 bg-gradient-to-r from-primary to-secondary opacity-10 blur-sm"></div>
<div class="bg-gradient-to-r from-primary to-primary-container h-full rounded-full w-3/5 transition-all duration-500 ease-out"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-3xl">
<!-- Question Card -->
<div class="bg-surface-container-lowest p-6 sm:p-10 rounded-xl outline outline-1 outline-outline-variant/20 shadow-[0_32px_64px_rgba(0,0,0,0.03)] relative overflow-hidden">
<!-- Subtle AI ambient detail -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-fixed opacity-20 rounded-full blur-3xl pointer-events-none"></div>
<div class="mb-8 relative z-10">
<h2 class="text-xl sm:text-2xl font-semibold text-on-surface leading-relaxed tracking-tight">
                    In the context of transformer models, what is the primary computational bottleneck of standard self-attention mechanisms as sequence length increases?
                </h2>
</div>
<!-- Options -->
<form class="space-y-4 relative z-10">
<!-- Option 1 -->
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-low hover:bg-surface-container-highest cursor-pointer transition-colors outline outline-1 outline-transparent hover:outline-outline-variant/20 group">
<div class="flex items-center h-6">
<input class="peer" name="q3" type="radio" value="a"/>
</div>
<div class="flex flex-col">
<span class="text-base font-medium text-on-surface group-hover:text-primary transition-colors">Linear complexity in feed-forward networks</span>
<span class="text-sm text-on-surface-variant mt-1">The FFN layers scale linearly, but they often contain the majority of parameters.</span>
</div>
</label>
<!-- Option 2 -->
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-lowest cursor-pointer transition-colors outline outline-1 outline-primary ring-1 ring-primary/10 shadow-[0_4px_12px_rgba(0,88,188,0.05)] group">
<div class="flex items-center h-6">
<input checked="" class="peer" name="q3" type="radio" value="b"/>
</div>
<div class="flex flex-col">
<span class="text-base font-semibold text-primary">Quadratic scaling of the attention matrix</span>
<span class="text-sm text-on-surface-variant mt-1">Calculating attention scores between all token pairs requires $O(N^2)$ time and memory complexity.</span>
</div>
</label>
<!-- Option 3 -->
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-low hover:bg-surface-container-highest cursor-pointer transition-colors outline outline-1 outline-transparent hover:outline-outline-variant/20 group">
<div class="flex items-center h-6">
<input class="peer" name="q3" type="radio" value="c"/>
</div>
<div class="flex flex-col">
<span class="text-base font-medium text-on-surface group-hover:text-primary transition-colors">Positional encoding generation</span>
<span class="text-sm text-on-surface-variant mt-1">Generating sinusoidal or learned positional encodings becomes computationally heavy for long sequences.</span>
</div>
</label>
<!-- Option 4 -->
<label class="flex items-start gap-4 p-4 rounded-lg bg-surface-container-low hover:bg-surface-container-highest cursor-pointer transition-colors outline outline-1 outline-transparent hover:outline-outline-variant/20 group">
<div class="flex items-center h-6">
<input class="peer" name="q3" type="radio" value="d"/>
</div>
<div class="flex flex-col">
<span class="text-base font-medium text-on-surface group-hover:text-primary transition-colors">Layer normalization synchronization</span>
<span class="text-sm text-on-surface-variant mt-1">Synchronizing layer norms across multiple GPUs during distributed training for long sequences.</span>
</div>
</label>
</form>
</div>
<!-- Action Area -->
<div class="mt-8 flex justify-between items-center">
<button class="px-6 py-3 rounded-md text-sm font-semibold text-primary bg-transparent hover:bg-surface-container-high transition-colors outline outline-1 outline-transparent">
                Previous Question
            </button>
<button class="px-8 py-3 rounded-md text-sm font-semibold text-on-primary bg-gradient-to-br from-primary to-primary-container outline outline-1 outline-primary-fixed-dim/50 hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center gap-2">
                Next Question
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</main>
</body></html>
